services:
  # Streamlit: フロントエンド/ダッシュボード
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-data-platform:latest
    container_name: edp-streamlit
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app
    # コンテナを落とさず維持するための設定
    tty: true
    stdin_open: true
    command: streamlit run src/app.py --server.address 0.0.0.0

  # FastAPI: ロジック/APIレイヤー
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-data-platform:latest
    container_name: edp-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    tty: true
    stdin_open: true
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Dagster: オーケストレーション
  dagster:
    build:
      context: .
      dockerfile: Dockerfile
    image: enterprise-data-platform:latest
    container_name: edp-dagster
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
    tty: true
    stdin_open: true
    command: dagster dev -h 0.0.0.0 -p 3000

# 共通のネットワーク設定
networks:
  default:
    name: edp-network
