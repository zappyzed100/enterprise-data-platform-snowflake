version: 2

sources:
  - name: raw_data
    description: "Snowflake上の生データ（Bronze層）"
    database: "{{ env_var('SNOWFLAKE_BRONZE_DATABASE', env_var('DBT_ENV_NAME', 'DEV') | upper ~ '_BRONZE_DB') }}"
    schema: "{{ env_var('SNOWFLAKE_BRONZE_SCHEMA', 'RAW_DATA') }}"
    tables:
      - name: ORDERS
        description: "注文履歴データ"
      - name: PRODUCTS
        description: "商品マスター"
      - name: LOGISTICS_CENTERS
        description: "物流拠点マスター"